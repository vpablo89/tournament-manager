services:
  db:
    image: postgres:16
    container_name: tournament-db
    environment:
      POSTGRES_DB: tournament_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: tournament-backend
    depends_on:
      - db
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tournament_manager
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    container_name: tournament-frontend
    depends_on:
      - backend
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"

volumes:
  db_data:
